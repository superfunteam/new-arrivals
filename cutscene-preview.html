<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cutscene Preview — New Store Zoom</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed; left: 12px; top: 12px;
      font: 12px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.55); padding: 8px 10px; border-radius: 6px;
      pointer-events: none;
    }
    #controls {
      position: fixed; left: 12px; bottom: 12px;
      font: 12px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.55); padding: 8px 10px; border-radius: 6px;
    }
    #waypoints {
      position: fixed; right: 12px; top: 12px; width: 280px; max-height: 90vh;
      overflow-y: auto; font: 12px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.65); padding: 10px 12px; border-radius: 6px;
    }
    #waypoints.collapsed { width: auto; padding: 6px 10px; }
    #waypoints.collapsed .row,
    #waypoints.collapsed #wp-list,
    #waypoints.collapsed #export-box,
    #waypoints.collapsed .hint { display: none !important; }
    #waypoints h3 .toggle { font-size: 14px; color: #aaa; margin-left: 8px; }
    #tweaks {
      position: fixed; left: 12px; top: 80px; width: 240px; max-height: 80vh;
      overflow-y: auto; font: 11px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.65); padding: 10px 12px; border-radius: 6px;
    }
    #tweaks.collapsed { width: auto; padding: 6px 10px; }
    #tweaks.collapsed .group,
    #tweaks.collapsed #tweaks-reset,
    #tweaks.collapsed #tweaks-export,
    #tweaks.collapsed #tweaks-export-box { display: none !important; }
    #tweaks h3 {
      margin: 0 0 8px 0; font-size: 12px; color: #FF6B9D;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    #tweaks.collapsed h3 { margin: 0; }
    #tweaks h3 .toggle { font-size: 14px; color: #aaa; }
    #tweaks label {
      display: block; margin: 6px 0 2px 0; font-size: 10px;
      color: #aaa; display: flex; justify-content: space-between;
    }
    #tweaks label .val { color: #FF6B9D; }
    #tweaks input[type="range"] {
      width: 100%; margin: 0 0 4px 0; accent-color: #FF6B9D;
    }
    #tweaks .group { border-top: 1px solid #333; padding-top: 6px; margin-top: 8px; }
    #tweaks .group:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
    #tweaks button {
      width: 100%; padding: 4px 8px; font-size: 10px;
      background: #444; color: #ddd; border: 0; border-radius: 4px; cursor: pointer;
      margin-top: 6px;
    }
    #waypoints h3 {
      margin: 0 0 6px 0; font-size: 12px; color: #FF6B9D;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    #waypoints.collapsed h3 { margin: 0; }
    #waypoints .row { display: flex; gap: 4px; margin: 4px 0; flex-wrap: wrap; }
    #wp-list { margin: 8px 0; }
    .wp-item {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 6px; margin: 2px 0;
      background: rgba(255,255,255,0.05); border-radius: 4px;
      font-size: 11px;
    }
    .wp-item button { padding: 2px 6px; font-size: 10px; margin: 0; }
    .wp-item .wp-label { flex: 1; }
    .wp-item .wp-coords { color: #888; font-size: 10px; }
    button {
      background: #FF6B9D; color: #000; border: 0; padding: 6px 10px;
      font: bold 12px ui-monospace, monospace; cursor: pointer; border-radius: 4px;
      margin: 0 4px 0 0;
    }
    button.secondary { background: #444; color: #ddd; }
    button.secondary:hover { background: #555; }
    button:hover { background: #ff89b0; }
    #status { font-style: italic; color: #aaa; }
    #export-box {
      width: 100%; height: 80px; margin-top: 6px; box-sizing: border-box;
      background: #111; color: #9f9; border: 1px solid #333;
      font: 10px/1.3 ui-monospace, monospace; padding: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="cv"></canvas>
  <div id="hud">
    <div><b>cutscene preview</b></div>
    <div id="status">loading FBX…</div>
  </div>
  <div id="controls">
    <button id="play">▶ play cutscene</button>
    <button id="orbit">free orbit</button>
    <span id="info"></span>
  </div>
  <div id="tweaks">
    <h3 id="tweaks-toggle"><span>tweaks</span><span class="toggle">▾</span></h3>
    <div class="group">
      <label>exposure <span class="val" id="v-exposure">1.80</span></label>
      <input type="range" id="s-exposure" min="0.2" max="4" step="0.05">
      <label>fly speed <span class="val" id="v-fly">0.06</span></label>
      <input type="range" id="s-fly" min="0.005" max="0.3" step="0.005">
    </div>
    <div class="group">
      <label>bloom strength <span class="val" id="v-bloom-strength">0.60</span></label>
      <input type="range" id="s-bloom-strength" min="0" max="2" step="0.05">
      <label>bloom threshold <span class="val" id="v-bloom-threshold">1.50</span></label>
      <input type="range" id="s-bloom-threshold" min="0" max="3" step="0.05">
      <label>bloom radius <span class="val" id="v-bloom-radius">0.50</span></label>
      <input type="range" id="s-bloom-radius" min="0" max="2" step="0.05">
    </div>
    <div class="group">
      <label>hemisphere <span class="val" id="v-hemi">2.20</span></label>
      <input type="range" id="s-hemi" min="0" max="6" step="0.1">
      <label>sun <span class="val" id="v-sun">2.00</span></label>
      <input type="range" id="s-sun" min="0" max="6" step="0.1">
      <label>front fill <span class="val" id="v-fill">1.40</span></label>
      <input type="range" id="s-fill" min="0" max="6" step="0.1">
      <label>lamp intensity <span class="val" id="v-lamps">1.00</span></label>
      <input type="range" id="s-lamps" min="0" max="3" step="0.05">
    </div>
    <div class="group">
      <label>env-map intensity <span class="val" id="v-env">0.60</span></label>
      <input type="range" id="s-env" min="0" max="2" step="0.05">
      <label>emissive intensity <span class="val" id="v-emis">1.50</span></label>
      <input type="range" id="s-emis" min="0" max="4" step="0.05">
    </div>
    <div class="group">
      <label>chromatic aberration <span class="val" id="v-rgb">0.0018</span></label>
      <input type="range" id="s-rgb" min="0" max="0.01" step="0.0002">
      <label>film grain <span class="val" id="v-film">0.25</span></label>
      <input type="range" id="s-film" min="0" max="1" step="0.05">
      <label>vignette darkness <span class="val" id="v-vig">1.15</span></label>
      <input type="range" id="s-vig" min="0" max="3" step="0.05">
    </div>
    <button id="tweaks-reset">reset to defaults</button>
    <button id="tweaks-export">export values</button>
    <textarea id="tweaks-export-box" readonly style="display:none;width:100%;height:80px;margin-top:6px;box-sizing:border-box;background:#111;color:#9f9;border:1px solid #333;font:10px/1.3 ui-monospace,monospace;padding:4px"></textarea>
  </div>
  <div id="waypoints">
    <h3 id="waypoints-toggle"><span>waypoint picker</span><span class="toggle">▾</span></h3>
    <div class="hint" style="color:#aaa;font-size:11px;margin-bottom:6px">
      Toggle <b>free orbit</b>, fly the camera to a good frame, then <b>save WP</b>.
      Play uses your saved list if any (else the bbox defaults).
    </div>
    <div class="row">
      <button id="wp-save">+ save WP</button>
      <button id="wp-play" class="secondary">▶ preview path</button>
    </div>
    <div class="row">
      <button id="wp-clear" class="secondary">clear all</button>
      <button id="wp-export" class="secondary">export</button>
    </div>
    <div id="wp-list"></div>
    <textarea id="export-box" readonly></textarea>
    <div style="color:#777;font-size:10px;margin-top:6px">
      Saved to localStorage. Reload-safe.
    </div>
  </div>
  <script type="module" src="/src/cutscene-preview.js"></script>
</body>
</html>
