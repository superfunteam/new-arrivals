<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cutscene Preview — New Store Zoom</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed; left: 12px; top: 12px;
      font: 12px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.55); padding: 8px 10px; border-radius: 6px;
      pointer-events: none;
    }
    #controls {
      position: fixed; left: 12px; bottom: 12px;
      font: 12px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.55); padding: 8px 10px; border-radius: 6px;
    }
    #waypoints {
      position: fixed; right: 12px; top: 12px; width: 280px; max-height: 90vh;
      overflow-y: auto; font: 12px/1.4 ui-monospace, Menlo, monospace;
      color: #ddd; background: rgba(0,0,0,0.65); padding: 10px 12px; border-radius: 6px;
    }
    #waypoints h3 { margin: 0 0 6px 0; font-size: 12px; color: #FF6B9D; }
    #waypoints .row { display: flex; gap: 4px; margin: 4px 0; flex-wrap: wrap; }
    #wp-list { margin: 8px 0; }
    .wp-item {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 6px; margin: 2px 0;
      background: rgba(255,255,255,0.05); border-radius: 4px;
      font-size: 11px;
    }
    .wp-item button { padding: 2px 6px; font-size: 10px; margin: 0; }
    .wp-item .wp-label { flex: 1; }
    .wp-item .wp-coords { color: #888; font-size: 10px; }
    button {
      background: #FF6B9D; color: #000; border: 0; padding: 6px 10px;
      font: bold 12px ui-monospace, monospace; cursor: pointer; border-radius: 4px;
      margin: 0 4px 0 0;
    }
    button.secondary { background: #444; color: #ddd; }
    button.secondary:hover { background: #555; }
    button:hover { background: #ff89b0; }
    #status { font-style: italic; color: #aaa; }
    #export-box {
      width: 100%; height: 80px; margin-top: 6px; box-sizing: border-box;
      background: #111; color: #9f9; border: 1px solid #333;
      font: 10px/1.3 ui-monospace, monospace; padding: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="cv"></canvas>
  <div id="hud">
    <div><b>cutscene preview</b></div>
    <div id="status">loading FBX…</div>
  </div>
  <div id="controls">
    <button id="play">▶ play cutscene</button>
    <button id="orbit">free orbit</button>
    <span id="info"></span>
  </div>
  <div id="waypoints">
    <h3>waypoint picker</h3>
    <div style="color:#aaa;font-size:11px;margin-bottom:6px">
      Toggle <b>free orbit</b>, fly the camera to a good frame, then <b>save WP</b>.
      Play uses your saved list if any (else the bbox defaults).
    </div>
    <div class="row">
      <button id="wp-save">+ save WP</button>
      <button id="wp-play" class="secondary">▶ preview path</button>
    </div>
    <div class="row">
      <button id="wp-clear" class="secondary">clear all</button>
      <button id="wp-export" class="secondary">export</button>
    </div>
    <div id="wp-list"></div>
    <textarea id="export-box" readonly></textarea>
    <div style="color:#777;font-size:10px;margin-top:6px">
      Saved to localStorage. Reload-safe.
    </div>
  </div>
  <script type="module" src="/src/cutscene-preview.js"></script>
</body>
</html>
