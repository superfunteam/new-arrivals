[build]
  command = "node scripts/fetch-posters.js && npx vite build && cd admin && npm install && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Cache posters aggressively — they never change for a given tmdb_id
[[headers]]
  for = "/posters/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Admin SPA — backroom routes serve admin index.html
[[redirects]]
  from = "/backroom/*"
  to = "/backroom/index.html"
  status = 200

# V2 functions register their own paths via export const config — no redirect needed

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
