[build]
  command = "node scripts/fetch-posters.js && npx vite build && cd admin && npm install && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Cache posters aggressively — they never change for a given tmdb_id
[[headers]]
  for = "/posters/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Admin SPA — backroom routes serve admin index.html
[[redirects]]
  from = "/backroom/*"
  to = "/backroom/index.html"
  status = 200

# NO /api/* redirect — v2 functions with config.path handle their own routes
# NO /* catch-all — game served from dist/index.html by default
