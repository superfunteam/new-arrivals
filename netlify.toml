[build]
  command = "node scripts/fetch-posters.js && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Cache posters aggressively — they never change for a given tmdb_id
[[headers]]
  for = "/posters/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
